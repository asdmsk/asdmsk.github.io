<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Объявления | АСД</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff; 
            overflow-x: hidden;
        }

        .container { 
            width: 100%;
            max-width: 800px; 
            margin: 0 auto; 
            padding: 10px; /* Уменьшены отступы для мобильных */
            box-sizing: border-box;
            text-align: center; 
        }

        /* Адаптивный контейнер для таблицы */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: calc(100vh - 180px); /* Динамическая высота под экран мобильного */
            min-height: 500px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* Плавный скролл для iOS */
            border: 1px solid #e2b04a;
            border-radius: 12px;
            background: #111;
            margin-top: 10px;
        }

        iframe {
            width: 1px;
            min-width: 100%;
            height: 2000px; /* Достаточный запас для контента таблицы */
            border: none;
        }

        /* Стили мобильного банера подписки */
        #ads-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: absolute;
            bottom: 0; /* Выезжает снизу на мобильных */
            left: 0;
            width: 100%;
            background: #1a1a1a;
            padding: 30px 20px;
            border-top: 2px solid #e2b04a;
            border-radius: 25px 25px 0 0;
            box-sizing: border-box;
            text-align: center;
            animation: slideUp 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            margin: 12px 0;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
        }

        .btn-email { background: #fff; color: #000; }
        .btn-tg { background: #0088cc; color: #fff; }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin: 15px 0;
            color: #e2b04a;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> На главную</a>
        <h2 style="color: #e2b04a; margin: 5px 0; letter-spacing: 1px;">ОБЪЯВЛЕНИЯ</h2>
        <p style="color: #888; font-size: 0.75rem; margin: 0 0 15px 0;">Московское объединение</p>
    </header>

    <div class="iframe-wrapper">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTCmm2vGARs0oV6QRI6pPMQi0XWgIF-nlppH0h3K4rj1ne_xOtnBp4YvwhHSXXKkvVV4qipCk5inUO-/pubhtml?widget=false&amp;chrome=false&amp;headers=false" 
                scrolling="yes"></iframe>
    </div>

    <footer style="margin-top: 20px; padding: 15px; color: #444; font-size: 0.7rem;">
        © <span id="year"></span> Община на Стремянном
    </footer>
</div>

<div id="ads-modal">
    <div class="modal-content">
        <div style="width: 40px; height: 4px; background: #333; border-radius: 2px; margin: -15px auto 20px;"></div>
        <h3 style="color: #e2b04a; margin-bottom: 10px;">ПОДПИШИТЕСЬ НА ОБЪЯВЛЕНИЯ</h3>
        <p style="color: #aaa; font-size: 0.85rem; margin-bottom: 25px;">Выберите удобный способ получения новостей</p>
        
        <a href="https://forms.gle/VUm5cB16Bes51hSs8" target="_blank" class="modal-btn btn-email">
            <i class="fas fa-envelope"></i> ПО ПОЧТЕ (EMAIL)
        </a>
        
        <a href="https://t.me/rupor_mo" target="_blank" class="modal-btn btn-tg">
            <i class="fab fa-telegram-plane"></i> В TELEGRAM
        </a>

        <button onclick="closeModal()" style="background: none; border: none; color: #666; margin-top: 20px; font-size: 0.9rem;">Закрыть</button>
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const modal = document.getElementById("ads-modal");

    window.onload = function() {
        setTimeout(() => {
            if (!sessionStorage.getItem('bannerClosed')) {
                modal.style.display = "block";
            }
        }, 3000);
    }

    function closeModal() {
        modal.style.display = "none";
        sessionStorage.setItem('bannerClosed', 'true');
    }

    // Закрытие при клике вне контента
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    }
</script>

</body>
</html>
