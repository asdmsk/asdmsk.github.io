<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Объявления | АСД</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { 
            background: #000; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #fff; 
        }

        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 15px; box-sizing: border-box; }

        .ad-card {
            background: #111;
            border: 1px solid #e2b04a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }

        .ad-title { color: #e2b04a; font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .ad-text { line-height: 1.5; color: #ddd; white-space: pre-wrap; font-size: 0.95rem; margin-bottom: 15px; }
        
        /* Сетка для маленьких кнопок */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 колонки */
            gap: 8px;
            margin-top: 15px;
        }

        .ad-link-btn {
            background: rgba(226, 176, 74, 0.1);
            color: #e2b04a;
            text-decoration: none;
            padding: 8px 4px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.7rem; /* Уменьшенный шрифт для компактности */
            border: 1px solid #e2b04a;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.2s;
        }

        .ad-link-btn i { font-size: 0.9rem; }
        .ad-link-btn:active { background: #e2b04a; color: #000; }

        /* Банер подписки */
        #ads-modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        .modal-content { position: absolute; bottom: 0; left: 0; width: 100%; background: #1a1a1a; padding: 30px 20px; border-top: 2px solid #e2b04a; border-radius: 25px 25px 0 0; box-sizing: border-box; text-align: center; animation: slideUp 0.5s ease; }
        .modal-btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px; margin: 12px 0; border-radius: 15px; text-decoration: none; font-weight: bold; }
        .btn-email { background: #fff; color: #000; }
        .btn-tg { background: #0088cc; color: #fff; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-link { display: inline-flex; align-items: center; gap: 5px; color: #e2b04a; text-decoration: none; margin-bottom: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> На главную</a>
        <h2 style="color: #e2b04a; margin: 0;">ОБЪЯВЛЕНИЯ</h2>
        <p style="color: #888; font-size: 0.75rem; margin-bottom: 25px;">Московское объединение</p>
    </header>

    <div id="loader" style="color: #666; margin-top: 50px; text-align: center; font-size: 0.9rem;">Загрузка актуальных данных...</div>
    <div id="ads-list"></div>

    <footer style="margin-top: 40px; padding-bottom: 30px; color: #444; font-size: 0.7rem; text-align: center;">
        © <span id="year"></span> Община на Стремянном
    </footer>
</div>

<div id="ads-modal">
    <div class="modal-content">
        <div style="width: 40px; height: 4px; background: #333; border-radius: 2px; margin: -15px auto 20px;"></div>
        <h3 style="color: #e2b04a; margin-bottom: 10px; font-size: 1.1rem;">ПОДПИШИТЕСЬ НА ОБЪЯВЛЕНИЯ</h3>
        <a href="https://forms.gle/VUm5cB16Bes51hSs8" target="_blank" class="modal-btn btn-email"><i class="fas fa-envelope"></i> ПО ПОЧТЕ</a>
        <a href="https://t.me/rupor_mo" target="_blank" class="modal-btn btn-tg"><i class="fab fa-telegram-plane"></i> В TELEGRAM</a>
        <button onclick="closeModal()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer;">Закрыть</button>
    </div>
</div>

<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const scriptUrl = 'https://script.google.com/macros/s/AKfycbwzj6dq4_XP1GjZdPeMoR-M817V-3aldnPf9BfeUpleQHEB7sbfW7XCfTtQ08MFoKah/exec'; 

    async function loadAds() {
        try {
            const response = await fetch(scriptUrl + '?full=true&t=' + Date.now());
            const data = await response.json();
            const list = document.getElementById('ads-list');
            document.getElementById('loader').style.display = 'none';

            data.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                
                let text = ad.description;
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const urls = text.match(urlRegex);
                
                let linksHtml = '';
                if (urls) {
                    linksHtml = '<div class="links-grid">';
                    urls.forEach((url, index) => {
                        // Пытаемся понять тип ссылки для иконки
                        let icon = 'fa-link';
                        if (url.includes('youtube')) icon = 'fa-play-circle';
                        if (url.includes('google')) icon = 'fa-file-alt';
                        
                        linksHtml += `
                            <a href="${url}" target="_blank" class="ad-link-btn">
                                <i class="fas ${icon}"></i>
                                ССЫЛКА ${index + 1}
                            </a>`;
                        text = text.replace(url, ""); 
                    });
                    linksHtml += '</div>';
                }

                card.innerHTML = `<div class="ad-title">${ad.title}</div><div class="ad-text">${text.trim()}</div>${linksHtml}`;
                list.appendChild(card);
            });
        } catch (e) {
            document.getElementById('loader').innerText = "На данный момент объявлений нет.";
        }
    }

    function closeModal() {
        document.getElementById("ads-modal").style.display = "none";
        sessionStorage.setItem('bannerClosed', 'true');
    }

    window.onload = () => {
        loadAds();
        setTimeout(() => {
            if (!sessionStorage.getItem('bannerClosed')) {
                document.getElementById("ads-modal").style.display = "block";
            }
        }, 3000);
    };

    window.onclick = (e) => { if (e.target.id === "ads-modal") closeModal(); };
</script>

</body>
</html>
