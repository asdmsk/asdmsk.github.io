<!DOCTYPE html>
<html lang="ru">
<head>
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
        m[i].l=1*new Date();
        for (var j = 0; j < document.scripts.length; j++) {if (m[i].src === r) { return; }}
        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
    })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=106917530', 'ym');
    ym(106917530, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция: На Стремянном</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Логотип" class="main-logo">
            </div>
            <h1>НА СТРЕМЯННОМ</h1>
        </header>

        <div class="live-info">
            <span style="opacity: 0.8; font-size: 0.8rem;">ВРЕМЯ НАЧАЛА:</span>
            <span id="live-time" class="time-display">Загрузка...</span>
        </div>

        <div class="channel-row">
            <a href="https://rutube.ru/channel/24704952/" class="btn" target="_blank">
                <i class="fas fa-play-circle"></i><span>RUTUBE</span>
            </a>
            <a href="https://www.youtube.com/c/asdstremianka/live" class="btn" target="_blank">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <span class="section-label">Плеер Rutube: <span id="rutube-status" class="status-badge status-searching">Загрузка...</span></span>
        <div class="video-container">
            <iframe id="rutubePlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>

        <span class="section-label">Плеер YouTube:</span>
        <div class="video-container">
            <iframe allowfullscreen frameborder="0" src="https://www.youtube.com/embed/live_stream?channel=UC93Fr_uHbGHLPk713WCG55w&rel=0&autoplay=1&mute=1"></iframe>
        </div>

        <nav class="links">
            <a href="index.html" class="btn back-btn">
                <i class="fas fa-arrow-left"></i><span>НА ГЛАВНУЮ</span>
            </a>
        </nav>

        <footer>
            <p>© 2026 Община на Стремянном</p>
        </footer>
    </div>

    <script>
        // 1. Установка времени начала (1 или 2 смена)
        function setActualTime() {
            const year = new Date().getFullYear();
            const timeElement = document.getElementById('live-time');
            // Четный год - 10:30, нечетный - 14:30
            timeElement.innerText = (year % 2 === 0) ? "Суббота 10:30" : "Суббота 14:30";
        }

        // 2. Умная загрузка Rutube
        async function autoLoadRutube() {
            const channelId = '24704952'; 
            const playlistId = '1063991'; 
            const statusEl = document.getElementById('rutube-status');
            const player = document.getElementById('rutubePlayer');

            // Сначала сразу ставим плейлист как резерв
            player.src = "https://rutube.ru/play/embed/playlist/" + playlistId + "/?skinColor=d57700";
            statusEl.innerText = "АРХИВ (ПЛЕЙЛИСТ)";

            try {
                // Пытаемся найти активную трансляцию через прокси
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = encodeURIComponent('https://rutube.ru/channel/' + channelId + '/');
                
                const response = await fetch(proxyUrl + targetUrl);
                const data = await response.json();
                const html = data.contents;

                // Регулярное выражение ищет 32-значный ID (например, ea3a425e68a94ed7b6526979fe977eb3)
                const match = html.match(/rutube\.ru\/play\/embed\/([a-z0-9]{32})/);
                
                if (match && match[1]) {
                    const videoId = match[1];
                    // Если нашли ID видео, меняем плейлист на конкретное видео (эфир)
                    player.src = "https://rutube.ru/play/embed/" + videoId + "/?skinColor=d57700&autoplay=1";
                    statusEl.innerText = "ПРЯМОЙ ЭФИР";
                    statusEl.className = "status-badge status-live";
                }
            } catch (e) {
                console.error("Ошибка автопоиска Rutube:", e);
                // В случае ошибки просто оставляем плейлист, который поставили в начале
            }
        }

        // Запуск при загрузке
        window.onload = function() {
            setActualTime();
            autoLoadRutube();
        };
    </script>
</body>
</html>
