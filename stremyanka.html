<!DOCTYPE html>
<html lang="ru">
<head>
    <script type="text/javascript">

        m[i].l=1*new Date();

        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
    })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=106917530', 'ym');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция: На Стремянном</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Логотип" class="main-logo">
            </div>
            <h1>НА СТРЕМЯННОМ</h1>
        </header>

        <div class="live-info">
            <span style="opacity: 0.8; font-size: 0.8rem;">ВРЕМЯ НАЧАЛА:</span>
            <span id="live-time" class="time-display">...</span>
        </div>

        <script>
            // МГНОВЕННАЯ УСТАНОВКА ВРЕМЕНИ
            // Этот скрипт стоит здесь, чтобы текст появился до загрузки плееров
            (function() {
                const year = new Date().getFullYear();
                const timeStr = (year % 2 === 0) ? "Суббота 10:30" : "Суббота 14:30";
                document.getElementById('live-time').innerText = timeStr;
            })();
        </script>

        <div class="channel-row">
            <a href="https://rutube.ru/channel/24704952/" class="btn" target="_blank">
                <i class="fas fa-play-circle"></i><span>RUTUBE</span>
            </a>
            <a href="https://www.youtube.com/c/asdstremianka/live" class="btn" target="_blank">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <span class="section-label">Плеер Rutube: <span id="rutube-status" class="status-badge">ПОИСК...</span></span>
        <div class="video-container">
            <iframe id="rutubePlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>

        <span class="section-label">Плеер YouTube:</span>
        <div class="video-container">
            <iframe allowfullscreen="" frameborder="0" src="//www.youtube.com/embed/live_stream?channel=UC93Fr_uHbGHLPk713WCG55w&rel=0&autoplay=1&vq=hd720"></iframe>
        </div>

        <nav>
            <a href="index.html" class="btn" style="justify-content: center;">
                <i class="fas fa-arrow-left"></i><span>НА ГЛАВНУЮ</span>
            </a>
        </nav>

        <footer>
            <p>© 2026 Община на Стремянном</p>
        </footer>
    </div>

    <script>
        // АВТОМАТИЧЕСКИЙ ПОИСК ID ТРАНСЛЯЦИИ В ФОНЕ
        async function autoLoadRutube() {
            const channelId = '24704952';
            const statusEl = document.getElementById('rutube-status');
            const player = document.getElementById('rutubePlayer');

            try {
                // Используем прокси для получения кода страницы
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://rutube.ru/channel/' + channelId + '/')}`);
                const data = await response.json();
                const html = data.contents;

                // Ищем 32-значный ID актуального видео
                const match = html.match(/rutube\.ru\/play\/embed\/([a-z0-9]{32})/);
                
                if (match && match[1]) {
                    const videoId = match[1];
                    player.src = `https://rutube.ru/play/embed/${videoId}/?skinColor=d57700`;
                    
                    // Проверяем статус эфира в коде
                    if (html.toLowerCase().includes('live') || html.toLowerCase().includes('эфир')) {
                        statusEl.innerText = "ПРЯМОЙ ЭФИР";
                        statusEl.style.color = "#00ff00";
                    } else {
                        statusEl.innerText = "АРХИВ";
                    }
                } else {
                    // Резервное видео, если ID не найден
                    player.src = "https://rutube.ru/play/embed/0f58426c7bac2c67a070222ba623a166";
                    statusEl.innerText = "АРХИВ";
                }
            } catch (e) {
                console.error("Rutube Error:", e);
                player.src = "https://rutube.ru/play/embed/0f58426c7bac2c67a070222ba623a166";
                statusEl.innerText = "АРХИВ";
            }
        }

        // Запускаем поиск Rutube без ожидания загрузки всей страницы
        autoLoadRutube();
    </script>
</body>
</html>
