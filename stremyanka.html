<html lang="ru">
<head>

        k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция: На Стремянном</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Логотип" class="main-logo">
            </div>
            <h1>НА СТРЕМЯННОМ</h1>
        </header>

        <div class="live-info">
            <span style="opacity: 0.8; font-size: 0.8rem;">ВРЕМЯ НАЧАЛА:</span>
            <span id="live-time" class="time-display">...</span>
        </div>

        <script>
            // Мгновенная установка времени
            (function() {
                const year = new Date().getFullYear();
                document.getElementById('live-time').innerText = (year % 2 === 0) ? "Суббота 10:30" : "Суббота 14:30";
            })();
        </script>

        <div class="channel-row">
            <a href="https://rutube.ru/channel/24704952/" class="btn" target="_blank">
                <i class="fas fa-play-circle"></i><span>RUTUBE</span>
            </a>
            <a href="https://www.youtube.com/c/asdstremianka/live" class="btn" target="_blank">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <span class="section-label">Плеер Rutube: <span id="rutube-status" class="status-badge">СИНХРОНИЗАЦИЯ...</span></span>
        <div class="video-container">
            <iframe id="rutubePlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>

        <span class="section-label">Плеер YouTube:</span>
        <div class="video-container">
            <iframe allowfullscreen frameborder="0" src="//www.youtube.com/embed/live_stream?channel=UC93Fr_uHbGHLPk713WCG55w&rel=0&autoplay=1&vq=hd720"></iframe>
        </div>

        <nav><a href="index.html" class="btn" style="justify-content: center;"><i class="fas fa-arrow-left"></i><span>НА ГЛАВНУЮ</span></a></nav>
        <footer><p>© 2026 Община на Стремянном</p></footer>
    </div>

    <script>
        async function loadFromGoogleSheets() {
            const baseCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5kIIPvzs7ZsDJjdDWzVjHGqcp_sUEeV-PCeWznbiHUv2GeWGKSxMYtyvZh9CzRt9nItm_bpyYQ63c/pub?gid=711141389&single=true&output=csv';
            // Используем прокси для надежности
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(baseCsvUrl)}&_=${Date.now()}`;
            
            const player = document.getElementById('rutubePlayer');
            const statusEl = document.getElementById('rutube-status');
            const backupId = "0f58426c7bac2c67a070222ba623a166"; 

            try {
                const response = await fetch(proxyUrl);
                const json = await response.json();
                const csvData = json.contents; 
                
                // Берем самую первую строку данных
                const firstRow = csvData.split('\n')[0];
                
                // Ищем 32-значный ID Rutube (например, 3a6a53600dd4f22de83c383256489ab8)
                const idMatch = firstRow.match(/[a-z0-9]{32}/);
                
                if (idMatch) {
                    const videoId = idMatch[0];
                    player.src = `https://rutube.ru/play/embed/${videoId}/?skinColor=d57700`;
                    
                    // Проверяем наличие ключевых слов для статуса
                    const lowerText = firstRow.toLowerCase();
                    if (lowerText.includes('трансляция') || lowerText.includes('эфир') || lowerText.includes('live')) {
                        statusEl.innerText = "ПРЯМОЙ ЭФИР";
                        statusEl.style.color = "#00ff00";
                    } else {
                        statusEl.innerText = "АРХИВ";
                        statusEl.style.color = "#ffffff";
                    }
                } else {
                    throw new Error("ID видео не найден в строке");
                }

            } catch (e) {
                console.error("Ошибка синхронизации:", e);
                player.src = `https://rutube.ru/play/embed/${backupId}/?skinColor=d57700`;
                statusEl.innerText = "АРХИВ (РЕЗЕРВ)";
            }
        }

        loadFromGoogleSheets();
    </script>
</body>
</html>
