    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция: На Стремянном</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Контейнер для адаптивности плееров */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 10px 0 30px 0;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .live-info {
            background: rgba(213, 119, 0, 0.2);
            border: 1px solid #d57700;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .time-display {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            display: block;
        }

        /* Кнопки в один ряд над плеером */
        .channel-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .channel-row .btn {
            flex: 1;
            font-size: 0.8rem;
            padding: 12px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
        .channel-row i { margin-right: 8px; }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 5px;
            text-align: left;
            display: block;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Логотип" class="main-logo">
            </div>
            <h1>НА СТРЕМЯННОМ</h1>
        </header>

        <div class="live-info">
            <span style="opacity: 0.8; font-size: 0.8rem;">ВРЕМЯ НАЧАЛА:</span>
            <span id="live-time" class="time-display">Загрузка...</span>
        </div>

        <div class="channel-row">
            <a href="https://rutube.ru/channel/24704952/" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-play-circle"></i><span>RUTUBE</span>
            </a>
            <a href="https://www.youtube.com/c/asdstremianka/live" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <span class="section-label">Плеер Rutube:</span>
        <div class="video-container">
            <iframe src="https://rutube.ru/play/embed/16d58c953429736c0b7f621906439d50/?skinColor=d57700" 
                    style="border: none;" allow="clipboard-write; autoplay" webkitAllowFullScreen mozallowfullscreen allowFullScreen>
            </iframe>
        </div>

        <span class="section-label">Плеер YouTube:</span>
        <div class="video-container">
            <iframe allowfullscreen="" frameborder="0" src="//www.youtube.com/embed/live_stream?channel=UC93Fr_uHbGHLPk713WCG55w&rel=0&autoplay=1&vq=hd720"></iframe>
        </div>

        <nav class="links">
            <a href="index.html" class="btn back-btn">
                <i class="fas fa-arrow-left"></i><span>НА ГЛАВНУЮ</span>
            </a>
        </nav>

        <footer>
            <p>© 2026 Община на Стремянном</p>
        </footer>
    </div>

    <script>
        function setActualTime() {
            const year = new Date().getFullYear();
            const timeElement = document.getElementById('live-time');
            // Четный год — 10:30, нечетный — 14:30
            if (year % 2 === 0) {
                timeElement.innerText = "Суббота 10:30";
            } else {
                timeElement.innerText = "Суббота 14:30";
            }
        }
        setActualTime();
    </script>
</body>
</html>
