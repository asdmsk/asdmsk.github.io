<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансляция: На Стремянном</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Логотип" class="main-logo">
            </div>
            <h1>НА СТРЕМЯННОМ</h1>
        </header>

        <div class="live-info">
            <span style="opacity: 0.8; font-size: 0.8rem;">ВРЕМЯ НАЧАЛА:</span>
            <span id="live-time" class="time-display">...</span>
        </div>

        <script>
            // МГНОВЕННОЕ ВРЕМЯ
            (function() {
                const year = new Date().getFullYear();
                document.getElementById('live-time').innerText = (year % 2 === 0) ? "Суббота 10:30" : "Суббота 14:30";
            })();
        </script>

        <div class="channel-row">
            <a href="https://rutube.ru/channel/24704952/" class="btn" target="_blank">
                <i class="fas fa-play-circle"></i><span>RUTUBE</span>
            </a>
            <a href="https://www.youtube.com/c/asdstremianka/live" class="btn" target="_blank">
                <i class="fab fa-youtube"></i><span>YOUTUBE</span>
            </a>
        </div>

        <span class="section-label">Плеер Rutube: <span id="rutube-status" class="status-badge">ЗАГРУЗКА...</span></span>
        <div class="video-container">
            <iframe id="rutubePlayer" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>
        </div>

        <span class="section-label">Плеер YouTube:</span>
        <div class="video-container">
            <iframe allowfullscreen frameborder="0" src="//www.youtube.com/embed/live_stream?channel=UC93Fr_uHbGHLPk713WCG55w&rel=0&autoplay=1&vq=hd720"></iframe>
        </div>

        <nav><a href="index.html" class="btn" style="justify-content: center;"><i class="fas fa-arrow-left"></i><span>НА ГЛАВНУЮ</span></a></nav>
        <footer><p>© 2026 Община на Стремянном</p></footer>
    </div>

    <script>
        async function loadFromGoogleSheets() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5kIIPvzs7ZsDJjdDWzVjHGqcp_sUEeV-PCeWznbiHUv2GeWGKSxMYtyvZh9CzRt9nItm_bpyYQ63c/pub?gid=711141389&single=true&output=csv';
            const player = document.getElementById('rutubePlayer');
            const statusEl = document.getElementById('rutube-status');
            // НОВЫЙ РЕЗЕРВНЫЙ ID
            const backupId = "0f58426c7bac2c67a070222ba623a166";

            try {
                const response = await fetch(csvUrl);
                const csvData = await response.text();
                const rows = csvData.split('\n');
                
                if (rows.length > 0) {
                    const columns = rows[0].split(',');
                    const title = columns[0] || "";
                    const link = columns[1] || "";

                    if (link && link.includes('rutube.ru')) {
                        const match = link.match(/([a-z0-9]{32})/);
                        if (match) {
                            player.src = `https://rutube.ru/play/embed/${match[0]}/?skinColor=d57700`;
                            statusEl.innerText = (title.toLowerCase().includes('эфир') || title.toLowerCase().includes('трансляция')) ? "ПРЯМОЙ ЭФИР" : "АРХИВ";
                        } else {
                            throw new Error("ID не найден в ссылке");
                        }
                    } else {
                        throw new Error("Ссылка пуста");
                    }
                }
            } catch (e) {
                console.error("Загрузка из таблицы не удалась, ставим резерв:", e);
                player.src = `https://rutube.ru/play/embed/${backupId}/?skinColor=d57700`;
                statusEl.innerText = "АРХИВ";
            }
        }

        loadFromGoogleSheets();
    </script>
</body>
</html>
