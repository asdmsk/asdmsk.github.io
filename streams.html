    <script>
        // Функция для обхода CORS и поиска ID видео на странице канала
        async function fetchRutubeId(channelId) {
            try {
                const proxyUrl = 'https://api.allorigins.win/get?url=';
                const targetUrl = encodeURIComponent('https://rutube.ru/channel/' + channelId + '/');
                
                const response = await fetch(proxyUrl + targetUrl);
                const data = await response.json();
                const html = data.contents;

                // Регулярное выражение ищет ID из 32 знаков в коде плеера
                const match = html.match(/rutube\.ru\/play\/embed\/([a-z0-9]{32})/);
                return match ? match[1] : null;
            } catch (e) {
                console.error("Ошибка автопоиска:", e);
                return null;
            }
        }

        // Логика нажатия на кнопку
        async function handleButtonClick(channelId, name, element) {
            const title = document.getElementById('videoTitle');
            const player = document.getElementById('mainPlayer');
            
            // Подсветка кнопки
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            if(element) element.classList.add('active');

            title.innerHTML = `ПОИСК ЭФИРА: ${name}... <i class="fas fa-spinner fa-spin loading-spinner"></i>`;
            
            const videoId = await fetchRutubeId(channelId);
            
            if (videoId) {
                player.src = `https://rutube.ru/play/embed/${videoId}/?skinColor=d57700&autoplay=1`;
                title.innerText = "СЕЙЧАС В ЭФИРЕ: " + name;
            } else {
                title.innerText = "ЭФИР НЕ НАЙДЕН: " + name + " (Попробуйте позже)";
                player.src = ""; 
            }
            // Скролл вверх к плееру
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Установка времени по годам для Стремянки и Замоскворечья
        function setActualTime() {
            const year = new Date().getFullYear();
            const stremyanka = document.getElementById('time-stremyanka');
            const zamo = document.getElementById('time-zamo');
            if (year % 2 === 0) {
                stremyanka.innerText = "Суббота 10:30"; zamo.innerText = "Суббота 14:30";
            } else {
                stremyanka.innerText = "Суббота 14:30"; zamo.innerText = "Суббота 10:30";
            }
        }

        // Поиск по списку
        function filterLinks() {
            let filter = document.getElementById('searchInput').value.toLowerCase();
            let buttons = document.getElementById('linksList').getElementsByTagName('button');
            for (let btn of buttons) {
                btn.style.display = btn.innerText.toLowerCase().includes(filter) ? "" : "none";
            }
        }

        // Автозапуск первой общины (Стремянка) при входе
        window.onload = function() {
            setActualTime();
            const firstBtn = document.querySelector('#linksList button');
            handleButtonClick('24704952', 'На Стремянном', firstBtn);
        };
    </script>
